name: Production Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trustaccept_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustaccept_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/trustaccept_test
      NODE_ENV: test
      AGENT_API_KEY_PEPPER: test-pepper
      WEBHOOK_SIGNING_SECRET: test-webhook-secret
      TAP_TIMESTAMP_SKEW_SECONDS: 300
      AUTH_SECRET: test-auth-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LOG_LEVEL: info

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
